# Zyk Playground — Railway service configuration
# This file configures the "zyk-playground" service.
# See the Railway deployment guide below for the full 3-service setup.
#
# ── How to deploy on Railway ─────────────────────────────────────────────────
#
# Railway project layout (create these 3 services in the dashboard):
#
#   1. Postgres          ← Add the Railway Postgres database plugin (one click)
#
#   2. hatchet-engine    ← "Deploy from Docker image"
#      Image: ghcr.io/hatchet-dev/hatchet/hatchet-lite:latest
#      Exposed port: 8080 (HTTP / REST API)
#      TCP port: 7077 (gRPC — needed by workers; enable via Railway TCP proxy)
#      Environment variables:
#        DATABASE_URL                  = ${{Postgres.DATABASE_URL}}
#        SERVER_AUTH_COOKIE_SECRETS    = "$(openssl rand -hex 32) $(openssl rand -hex 32)"
#        SERVER_AUTH_COOKIE_DOMAIN     = <hatchet-engine.up.railway.app domain>
#        SERVER_GRPC_BIND_ADDRESS      = 0.0.0.0
#        SERVER_GRPC_PORT              = 7077
#        SERVER_GRPC_BROADCAST_ADDRESS = hatchet-engine.railway.internal:7077
#        SERVER_GRPC_INSECURE          = t
#        SERVER_AUTH_SET_EMAIL_VERIFIED = t
#        SERVER_AUTH_COOKIE_INSECURE   = t
#
#   3. zyk-playground    ← This service (source: playground/ subdirectory)
#      Environment variables: see [variables] section below
#
# ── Token generation (one-time, after Hatchet is healthy) ────────────────────
#
#   HATCHET_BASE_URL=https://hatchet-engine.up.railway.app \
#     node scripts/generate-token.js
#
#   Then paste the printed token into HATCHET_CLIENT_TOKEN below.
#
# ─────────────────────────────────────────────────────────────────────────────

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# / returns 200 once Next.js is up
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# ── Required environment variables ───────────────────────────────────────────
# Set these in the Railway dashboard for the zyk-playground service.
# Do NOT commit real values here.
#
# ANTHROPIC_API_KEY          = sk-ant-...
# HATCHET_CLIENT_TOKEN       = <token from generate-token.js>
# HATCHET_HOST_PORT          = hatchet-engine.railway.internal:7077
# HATCHET_CLIENT_HOST_PORT   = hatchet-engine.railway.internal:7077
# HATCHET_CLIENT_TLS_STRATEGY = none
# ZYK_WEBHOOK_BASE           = http://localhost:3000   ← keep as localhost
#                               (workers run inside the same container as Next.js)
#
# Optional — pre-configured API keys for playground workflows:
# TAVILY_API_KEY             =
# OPENWEATHERMAP_API_KEY     =
# NEWSAPI_API_KEY            =
# RESEND_API_KEY             =
