name: Bug report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as you can.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: |
        Include the prompt you gave Claude, any workflow code that was generated, and what went wrong.
      placeholder: |
        1. Asked Claude to create a workflow that...
        2. Claude generated this code: ...
        3. Error seen: ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error output
      description: Paste any relevant error messages from the MCP server, Hatchet UI, or terminal.
      render: shell

  - type: input
    id: node_version
    attributes:
      label: Node.js version
      placeholder: "e.g. 20.11.0"
    validations:
      required: true

  - type: input
    id: docker_version
    attributes:
      label: Docker version
      placeholder: "e.g. 27.3.1"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Windows
        - Linux
    validations:
      required: true
